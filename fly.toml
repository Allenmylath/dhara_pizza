app = "dhara-pizza"
primary_region = "bom"  # Mumbai — closest to Kerala

[build]

[env]
  PORT = "10000"

[http_service]
  internal_port = 10000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 50

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
