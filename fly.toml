# fly.toml app configuration file generated for dhara-pizza on 2026-05-15T14:39:04Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'dhara-pizza'
primary_region = 'ams'

[build]

[env]
  PORT = '10000'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 50

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
